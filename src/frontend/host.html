
<!-- host.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#6366f1,#9333ea);color:white;text-align:center;padding:30px}
h1{margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;max-width:1000px;margin:20px auto}
.movie{background:white;color:black;border-radius:16px;padding:10px;cursor:pointer;transition:.2s}
.movie:hover{transform:scale(1.05)}
.selected{border:4px solid #22c55e}
img{width:100%;border-radius:12px}
button{margin-top:20px;padding:14px 24px;border:none;border-radius:10px;background:#22c55e;color:white;font-size:16px;cursor:pointer}
</style>
</head>
<body>

<h1>Select Movies</h1>
<p>Room Code: <span id="code"></span></p>

<div id="grid" class="grid"></div>
<button onclick="startGame()">Start Game</button>

<script>
document.getElementById('code').innerText=localStorage.getItem('roomCode');

let selected=[];
const movies=[
{title:'Inception',img:'https://via.placeholder.com/200'},
{title:'Interstellar',img:'https://via.placeholder.com/200'},
{title:'Matrix',img:'https://via.placeholder.com/200'},
{title:'Avatar',img:'https://via.placeholder.com/200'}
];

movies.forEach(m=>{
const div=document.createElement('div');
div.className='movie';
div.innerHTML=`<img src="${m.img}"><p>${m.title}</p>`;

div.onclick=()=>{
div.classList.toggle('selected');
if(selected.includes(m.title)) selected=selected.filter(x=>x!==m.title);
else selected.push(m.title);
};

document.getElementById('grid').appendChild(div);
});

function startGame(){
if(selected.length===0){alert('Select movies');return;}
localStorage.setItem('selectedMovies',JSON.stringify(selected));
alert('Game starting');
}
</script>
</body>
</html>
