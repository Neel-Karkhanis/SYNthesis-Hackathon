<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6366f1,#9333ea)}
.card{background:white;padding:32px;border-radius:20px;width:380px;box-shadow:0 15px 40px rgba(0,0,0,.25);text-align:center}
h1{margin-bottom:20px}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;background:#6366f1;color:white;font-size:16px;cursor:pointer}
.secondary{background:#e5e7eb;color:#111}
.hidden{display:none}
input{width:100%;padding:14px;margin-top:10px;border-radius:10px;border:1px solid #ccc;text-align:center;font-size:16px}
</style>
</head>
<body>

<div id="home" class="card">
<h1>Movie Night</h1>
<button onclick="showJoin()">Join Room</button>
<button class="secondary" onclick="showCreate()">Create Room</button>
</div>

<div id="join" class="card hidden">
<h1>Enter Code</h1>
<input id="codeInput" placeholder="123456" />
<button onclick="joinRoom()">Join</button>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<div id="create" class="card hidden">
<h1>Create Room</h1>
<input id="nameInput" placeholder="Your name" />
<button onclick="createRoom()">Continue</button>
<button class="secondary" onclick="goHome()">Back</button>
</div>

<script>
function showJoin(){hide();join.classList.remove('hidden')}
function showCreate(){hide();create.classList.remove('hidden')}
function goHome(){hide();home.classList.remove('hidden')}
function hide(){home.classList.add('hidden');join.classList.add('hidden');create.classList.add('hidden')}

function createRoom(){
const code=Math.floor(100000+Math.random()*900000);
const name=nameInput.value.trim();
if(!name) return;
localStorage.setItem('roomCode',code);
localStorage.setItem('hostName',name);
location.href='host.html';
}

function joinRoom(){
const code = codeInput.value.trim();
if(!code) return;
localStorage.setItem('roomCode',code);
location.href='player.html';
}
</script>
</body>
</html>
