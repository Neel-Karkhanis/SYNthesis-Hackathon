<!-- player.html (TINDER STYLE SWIPE) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swipe Movies</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#6366f1,#9333ea);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{width:320px;height:480px;background:white;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.3);position:relative;overflow:hidden;user-select:none}
.card img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.overlay{position:absolute;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.85));width:100%;color:white;padding:20px}
.overlay h3{margin-bottom:6px}
.overlay p{font-size:13px;opacity:.85;max-height:70px;overflow:hidden}
.label{position:absolute;top:20px;font-size:24px;font-weight:bold;padding:8px 16px;border-radius:8px;display:none;background:rgba(255,255,255,.9)}
.like{left:20px;color:#22c55e;border:3px solid #22c55e}
.nope{right:20px;color:#ef4444;border:3px solid #ef4444}
.centerText{text-align:center;margin-top:20px}
.hidden{display:none}
.buttons{margin-top:20px;display:flex;gap:20px}
.buttons button{width:60px;height:60px;border-radius:50%;border:none;font-size:24px;cursor:pointer}
.noBtn{background:#ef4444;color:white}
.yesBtn{background:#22c55e;color:white}
.progress{margin-top:15px;opacity:.85}
.resultCard{background:white;color:black;border-radius:16px;padding:20px;max-width:360px;text-align:center;margin-top:20px}
.winner{border:4px solid #22c55e;padding:16px}
.winner img{width:100%;border-radius:12px;aspect-ratio:2/3;object-fit:cover}
.rank{margin-top:14px;text-align:left;font-size:14px}
.rank div{padding:6px 0;border-bottom:1px solid #eee;display:flex;justify-content:space-between}
</style>
</head>
<body>

<div id="waiting" class="centerText">
<h2>Loading...</h2>
<p>Room: <span id="code"></span></p>
</div>

<div id="swipeContainer" class="hidden">
<div id="card" class="card">
<div class="label like" id="likeLabel">LIKE</div>
<div class="label nope" id="nopeLabel">NOPE</div>
<img id="poster">
<div class="overlay"><h3 id="title"></h3><p id="overview"></p></div>
</div>
<div class="buttons">
<button class="noBtn" onclick="btnSwipe(false)">✕</button>
<button class="yesBtn" onclick="btnSwipe(true)">♥</button>
</div>
<div class="progress" id="progress"></div>
</div>

<div id="done" class="centerText hidden">
<h2 id="doneMsg">Waiting for others...</h2>
<p id="doneDetail"></p>
</div>

<div id="resultsWrap" class="hidden centerText">
<h2>The winner is</h2>
<div id="winnerCard" class="resultCard winner"></div>
<div class="resultCard" id="rankList" style="margin-top:20px"><h3>Full Ranking</h3><div class="rank" id="rankBody"></div></div>
</div>

<script>
const API="";
const code=localStorage.getItem('roomCode');
const name=localStorage.getItem('displayName');
document.getElementById('code').innerText=code||'???';

let movies=[];
let index=0;

async function loadMovies(){
  try{
    const res=await fetch(`${API}/rooms/${code}/movies`);
    movies=await res.json();
    if(!res.ok||!Array.isArray(movies)||movies.length===0){
      document.getElementById('waiting').innerHTML='<h2>No movies yet</h2><p>Host is still setting things up.</p>';
      setTimeout(loadMovies,2000);
      return;
    }
    waiting.classList.add('hidden');
    swipeContainer.classList.remove('hidden');
    loadMovie();
  }catch(e){
    document.getElementById('waiting').innerHTML='<h2>Could not reach the server.</h2>';
  }
}

function loadMovie(){
  if(index>=movies.length){finishVoting();return;}
  const m=movies[index];
  document.getElementById('poster').src=m.poster||'';
  document.getElementById('title').innerText=m.title;
  document.getElementById('overview').innerText=m.overview||'';
  document.getElementById('progress').innerText=`${index+1} / ${movies.length}`;
}

async function sendVote(like){
  try{
    await fetch(`${API}/rooms/${code}/vote`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({display_name:name,movie_id:movies[index].id,vote:like?'yes':'no'})
    });
  }catch(e){}
}

async function finishVoting(){
  swipeContainer.classList.add('hidden');
  done.classList.remove('hidden');
  try{
    await fetch(`${API}/rooms/${code}/done`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({display_name:name})
    });
  }catch(e){}
  pollForResults();
}

async function pollForResults(){
  try{
    const statusRes=await fetch(`${API}/rooms/${code}/status`);
    const status=await statusRes.json();
    document.getElementById('doneDetail').innerText=`${status.done} / ${status.total} finished`;
    if(status.finished){
      const res=await fetch(`${API}/rooms/${code}/results`);
      const results=await res.json();
      if(res.ok)showResults(results);
      else setTimeout(pollForResults,2000);
      return;
    }
  }catch(e){}
  setTimeout(pollForResults,2000);
}

function showResults(results){
  done.classList.add('hidden');
  resultsWrap.classList.remove('hidden');
  const winner=results.find(r=>r.winner);
  if(winner){
    const w=winner.movie;
    const img=w.poster?`<img src="${w.poster}">`:'';
    document.getElementById('winnerCard').innerHTML=`${img}<h2 style="margin-top:12px">${w.title}</h2><p style="margin-top:6px;opacity:.7">${winner.yes} yes · ${winner.no} no</p>`;
  }
  const body=document.getElementById('rankBody');
  body.innerHTML='';
  results.forEach(r=>{
    const row=document.createElement('div');
    row.innerHTML=`<span>${r.movie.title}${r.winner?' 👑':''}</span><span>${r.yes}✓ / ${r.no}✗</span>`;
    body.appendChild(row);
  });
}

// Drag
let startX=0,currentX=0,dragging=false;
const card=document.getElementById('card');
card.addEventListener('mousedown',start);
card.addEventListener('touchstart',start);

function start(e){dragging=true;startX=getX(e);document.addEventListener('mousemove',move);document.addEventListener('touchmove',move);document.addEventListener('mouseup',endDrag);document.addEventListener('touchend',endDrag);}
function move(e){if(!dragging)return;currentX=getX(e)-startX;card.style.transform=`translateX(${currentX}px) rotate(${currentX/10}deg)`;if(currentX>50){likeLabel.style.display='block';nopeLabel.style.display='none'}else if(currentX<-50){nopeLabel.style.display='block';likeLabel.style.display='none'}else{likeLabel.style.display='none';nopeLabel.style.display='none'}}
function endDrag(){dragging=false;if(currentX>120)swipeCard(true);else if(currentX<-120)swipeCard(false);else resetCard();document.removeEventListener('mousemove',move);document.removeEventListener('touchmove',move);document.removeEventListener('mouseup',endDrag);document.removeEventListener('touchend',endDrag);}
function swipeCard(like){card.style.transition='0.3s';card.style.transform=`translateX(${like?500:-500}px) rotate(${like?20:-20}deg)`;sendVote(like);setTimeout(()=>{index++;card.style.transition='none';resetCard();loadMovie();},300);}
function btnSwipe(like){swipeCard(like);}
function resetCard(){currentX=0;card.style.transform='';likeLabel.style.display='none';nopeLabel.style.display='none';}
function getX(e){return e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX}

if(!code||!name){location.href='index.html';}
else{loadMovies();}
</script>
</body>
</html>
