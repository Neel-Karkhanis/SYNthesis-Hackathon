<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Code Entry</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6366f1, #9333ea);
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #4f46e5;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Enter Room Code</h1>
    <input id="roomCode" placeholder="e.g. 123456" />
    <div id="error" class="error">Please enter a valid room code.</div>
    <button onclick="handleJoin()">Join Room</button>
  </div>

  <script>
    function handleJoin() {
      const roomCode = document.getElementById("roomCode").value.trim();
      const errorEl = document.getElementById("error");

      if (!roomCode || roomCode.length < 4) {
        errorEl.style.display = "block";
        return;
      }

      errorEl.style.display = "none";
      alert("Joining room: " + roomCode);
      // Replace with real navigation or API call
    }
  </script>
</body>
</html>
